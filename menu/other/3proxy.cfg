nserver 1.1.1.1
nserver 8.8.8.8
nscache 3600
timeouts 1 5 30 60 180 1800 15 60
daemon

log /var/log/3proxy/3proxy.log D
logformat " %d.%m.%y %H:%M:%S %N.%p %U %C:%c %R:%r %O %I %h %T"
archiver gz /usr/bin/gzip %F
rotate 30

users USER:CL:PaSwOrD

flush

auth strong
allow *
#proxy -n
socks -n -a -p1080 
proxy -n -a -p3128
